<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Mesh - Pro Testing Environment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        :root {
            --c-bg: #03060f;
            --c-surface: #080f1e;
            --c-panel: #0b1323;
            --c-indigo: #6366f1;
            --c-emerald: #10b981;
            --c-sky: #0ea5e9;
            --c-border: rgba(255,255,255,0.06);
            --c-border-md: rgba(255,255,255,0.10);
            --c-text-dim: rgba(148,163,184,0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--c-bg);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99,102,241,0.12) 0%, transparent 60%),
                linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 60px 60px, 60px 60px;
            font-family: 'Tajawal', sans-serif;
            color: #e2e8f0;
            overflow: hidden;
            height: 100vh;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #312e81; border-radius: 10px; }

        /* ── Card States ── */
        .agent-card {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: 18px;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }
        .agent-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 18px;
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }
        .state-sleeping::before { background: radial-gradient(circle at 50% 0%, rgba(99,102,241,0.06) 0%, transparent 70%); opacity: 1; }
        .state-working {
            border-color: rgba(16,185,129,0.5);
            background: rgba(16,185,129,0.05);
        }
        .state-working::before { background: radial-gradient(circle at 50% 0%, rgba(16,185,129,0.15) 0%, transparent 70%); opacity: 1; }
        .state-thinking {
            border-color: rgba(14,165,233,0.5);
            background: rgba(14,165,233,0.05);
        }
        .state-thinking::before { background: radial-gradient(circle at 50% 0%, rgba(14,165,233,0.15) 0%, transparent 70%); opacity: 1; }

        /* ── Corner glow dots ── */
        .agent-card .corner-dot {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--c-border-md);
            transition: all 0.4s ease;
        }
        .state-working .corner-dot { background: var(--c-emerald); box-shadow: 0 0 8px var(--c-emerald); animation: pulseDot 1.2s ease-in-out infinite; }
        .state-thinking .corner-dot { background: var(--c-sky); box-shadow: 0 0 8px var(--c-sky); animation: pulseDot 0.8s ease-in-out infinite; }

        /* ── Scan Line ── */
        .scan-line {
            position: absolute;
            left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(99,102,241,0.6), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .state-working .scan-line { background: linear-gradient(90deg, transparent, rgba(16,185,129,0.7), transparent); opacity: 1; animation: scanMove 2s linear infinite; }
        .state-thinking .scan-line { background: linear-gradient(90deg, transparent, rgba(14,165,233,0.7), transparent); opacity: 1; animation: scanMove 1.4s linear infinite; }

        /* ── Progress Bar ── */
        .progress-bar {
            position: absolute;
            bottom: 0; left: 0;
            height: 2px;
            width: 0%;
            border-radius: 0 0 18px 18px;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .state-working .progress-bar { background: linear-gradient(90deg, transparent, var(--c-emerald)); opacity: 1; animation: progressFill 3s ease-in-out infinite; }
        .state-thinking .progress-bar { background: linear-gradient(90deg, transparent, var(--c-sky)); opacity: 1; animation: progressFill 2s ease-in-out infinite; }

        /* ── Avatar SVG ── */
        .avatar-wrap {
            transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
        }
        .state-working .avatar-wrap { animation: workBounce 0.8s ease-in-out infinite alternate; }
        .state-thinking .avatar-wrap { animation: thinkSway 1.5s ease-in-out infinite; }
        .state-sleeping .avatar-wrap { animation: floatSlow 4s ease-in-out infinite; }

        /* ── Particles ── */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }
        .state-working .particle { background: var(--c-emerald); animation: particleFly 1.5s ease-out infinite; }
        .state-thinking .particle { background: var(--c-sky); animation: particleFly 2s ease-out infinite; }
        .p1 { width: 3px; height: 3px; bottom: 30%; left: 20%; animation-delay: 0s !important; }
        .p2 { width: 2px; height: 2px; bottom: 25%; left: 50%; animation-delay: 0.5s !important; }
        .p3 { width: 3px; height: 3px; bottom: 35%; left: 75%; animation-delay: 1s !important; }

        /* ── ZZZ ── */
        .zzz-wrap span {
            position: absolute;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            color: #6366f1;
            opacity: 0;
        }
        .zzz-wrap span:nth-child(1) { font-size: 9px; bottom: 55%; right: 15%; animation: zzzFloat 2.5s 0s infinite; }
        .zzz-wrap span:nth-child(2) { font-size: 7px; bottom: 62%; right: 22%; animation: zzzFloat 2.5s 0.8s infinite; }
        .zzz-wrap span:nth-child(3) { font-size: 6px; bottom: 68%; right: 28%; animation: zzzFloat 2.5s 1.6s infinite; }

        /* ── Thinking Dots ── */
        .think-dot {
            width: 4px; height: 4px;
            background: var(--c-sky);
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            opacity: 0;
        }
        .state-thinking .think-dot { animation: thinkBlink 1.2s ease-in-out infinite; }
        .think-dot:nth-child(2) { animation-delay: 0.2s !important; }
        .think-dot:nth-child(3) { animation-delay: 0.4s !important; }

        /* ── Connection Line ── */
        .conn-line { filter: drop-shadow(0 0 4px rgba(99,102,241,0.6)); }

        /* ── Header ── */
        .header-logo {
            font-family: 'Space Mono', monospace;
            letter-spacing: -1px;
        }

        /* ── Log Item ── */
        .log-item {
            animation: logSlide 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }

        /* ── Status Pill ── */
        .status-pill {
            font-family: 'Space Mono', monospace;
            letter-spacing: 0.05em;
        }

        /* ── Keyframes ── */
        @keyframes scanMove {
            0% { top: -2px; }
            100% { top: calc(100% + 2px); }
        }
        @keyframes progressFill {
            0% { width: 0%; opacity: 0.6; }
            60% { width: 85%; opacity: 1; }
            100% { width: 100%; opacity: 0.3; }
        }
        @keyframes pulseDot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.6); opacity: 0.5; }
        }
        @keyframes workBounce {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-4px) scale(1.03); }
        }
        @keyframes thinkSway {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }
        @keyframes floatSlow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        @keyframes particleFly {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-40px) scale(0); opacity: 0; }
        }
        @keyframes zzzFloat {
            0% { transform: translate(0,0) scale(0.5); opacity: 0; }
            30% { opacity: 0.8; }
            100% { transform: translate(-15px,-30px) scale(1); opacity: 0; }
        }
        @keyframes thinkBlink {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        @keyframes logSlide {
            0% { transform: translateY(-8px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        @keyframes dashFlow { to { stroke-dashoffset: -100; } }
        @keyframes onlinePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
            50% { box-shadow: 0 0 0 5px rgba(16,185,129,0); }
        }
        @keyframes cardEntry {
            0% { opacity: 0; transform: scale(0.85) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .card-enter { animation: cardEntry 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const AgentAvatar = ({ color, gender, status }) => {
            const isSleeping = status === 'sleeping';
            const isWorking = status === 'working';
            const isThinking = status === 'thinking';
            return (
                <div className="avatar-wrap" style={{display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <svg width="72" height="72" viewBox="0 0 50 50">
                        {gender === 'female' && (
                            <path d="M10 25 Q10 5 25 5 Q40 5 40 25 L42 32 L8 32 Z" fill="#1e1b4b" />
                        )}
                        <rect x="12" y="30" width="26" height="15" rx="6" fill={color} />
                        <rect x="10" y="42" width="30" height="6" rx="1.5" fill="#05080f" />
                        {(isWorking || isThinking) && (
                            <rect x="12" y="43" width="26" height="4" rx="1"
                                fill={isWorking ? '#10b981' : '#0ea5e9'}
                                style={{animation: 'pulseDot 1s ease-in-out infinite'}} />
                        )}
                        <rect x="16" y="10" width="18" height="18" rx="8" fill="#ffe0b0" />
                        <g>
                            {isSleeping ? (
                                <g>
                                    <path d="M19 19 Q21 17 23 19" stroke="#2d1b14" strokeWidth="1.2" fill="none" strokeLinecap="round" />
                                    <path d="M27 19 Q29 17 31 19" stroke="#2d1b14" strokeWidth="1.2" fill="none" strokeLinecap="round" />
                                </g>
                            ) : (
                                <g>
                                    <circle cx="21" cy="20" r="2" fill="#2d1b14" />
                                    <circle cx="29" cy="20" r="2" fill="#2d1b14" />
                                    {isThinking && (
                                        <g>
                                            <circle cx="21" cy="20" r="0.8" fill="white" opacity="0.7" />
                                            <circle cx="29" cy="20" r="0.8" fill="white" opacity="0.7" />
                                        </g>
                                    )}
                                </g>
                            )}
                        </g>
                        {isWorking && (
                            <g>
                                <path d="M13 33 L37 33" stroke="#10b981" strokeWidth="0.8" opacity="0.4" />
                            </g>
                        )}
                    </svg>
                </div>
            );
        };

        const AgentCard = ({ agent, refCallback }) => {
            const stateClass = `state-${agent.status}`;
            const isWorking = agent.status === 'working';
            const isThinking = agent.status === 'thinking';
            const isSleeping = agent.status === 'sleeping';

            return (
                <div
                    ref={refCallback}
                    className={`agent-card ${stateClass} card-enter`}
                    style={{ padding: '14px 16px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '8px', height: '170px' }}
                >
                    <div className="corner-dot" />
                    <div className="scan-line" />
                    <div className="progress-bar" />
                    <div className="particle p1" />
                    <div className="particle p2" />
                    <div className="particle p3" />

                    <AgentAvatar color={agent.color} gender={agent.gender} status={agent.status} />

                    {isSleeping && (
                        <div className="zzz-wrap" style={{position:'absolute',inset:0,pointerEvents:'none'}}>
                            <span>Z</span><span>Z</span><span>z</span>
                        </div>
                    )}

                    <div style={{ textAlign: 'center', marginTop: '2px' }}>
                        <div style={{ fontSize: '12px', fontWeight: 700, color: '#f1f5f9', letterSpacing: '0.01em', lineHeight: 1.2 }}>
                            {agent.name}
                        </div>
                        <div style={{ fontSize: '9px', fontWeight: 700, color: isWorking ? '#10b981' : isThinking ? '#0ea5e9' : 'rgba(99,102,241,0.7)', textTransform: 'uppercase', letterSpacing: '0.12em', marginTop: '2px', fontFamily: 'Space Mono, monospace' }}>
                            {agent.role}
                        </div>
                    </div>

                    {(isWorking || isThinking) && (
                        <div style={{ display: 'flex', alignItems: 'center', gap: '2px', marginTop: '2px' }}>
                            <span className="think-dot" style={{ background: isWorking ? '#10b981' : '#0ea5e9' }} />
                            <span className="think-dot" style={{ background: isWorking ? '#10b981' : '#0ea5e9' }} />
                            <span className="think-dot" style={{ background: isWorking ? '#10b981' : '#0ea5e9' }} />
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            const [agents, setAgents] = useState([]);
            const [connections, setConnections] = useState([]);
            const [logs, setLogs] = useState([]);
            const [isOnline, setIsOnline] = useState(false);
            const containerRef = useRef(null);
            const agentRefs = useRef({});
            const socketRef = useRef(null);

            const addLog = useCallback((text, type = 'info') => {
                setLogs(prev => [{
                    id: Date.now() + Math.random(),
                    text, type,
                    time: new Date().toLocaleTimeString('ar-EG')
                }, ...prev].slice(0, 60));
            }, []);

            useEffect(() => {
                socketRef.current = io('http://localhost:5000');
                socketRef.current.on('connect', () => { setIsOnline(true); addLog('اتصال مستقر مع المحرك', 'success'); });
                socketRef.current.on('disconnect', () => {
                    setIsOnline(false);
                    addLog('فشل الاتصال بالسيرفر', 'error');
                    setAgents(prev => prev.map(a => ({ ...a, status: 'sleeping' })));
                    setConnections([]);
                });
                socketRef.current.on('add_agent', (data) => {
                    setAgents(prev => {
                        const exists = prev.find(a => a.id === data.id);
                        if (exists) {
                            // وكيل موجود → حدّث بياناته فقط، لا تمس الـ status
                            return prev.map(a => a.id === data.id ? { ...a, ...data, status: a.status } : a);
                        }
                        return [...prev, { ...data, status: 'sleeping' }];
                    });
                });

                // حدث اختياري: السيرفر يرسل قائمة كاملة جديدة → استبدال كامل
                socketRef.current.on('set_agents', (list) => {
                    setAgents(list.map(d => ({ ...d, status: 'sleeping' })));
                });

                // حدث اختياري: مسح كل الوكلاء
                socketRef.current.on('clear_agents', () => {
                    setAgents([]);
                    setConnections([]);
                });
                socketRef.current.on('ui_command', (data) => {
                    if (data.action === 'connection') {
                        const connId = `${data.agent_id}-${data.target_id}-${Date.now()}`;
                        setConnections(prev => [...prev, { id: connId, from: data.agent_id, to: data.target_id }]);
                        setTimeout(() => setConnections(prev => prev.filter(c => c.id !== connId)), 4000);
                    } else {
                        setAgents(prev => prev.map(a => a.id === data.agent_id ? { ...a, status: data.action } : a));
                    }
                });
                socketRef.current.on('server_log', (data) => addLog(data.text, data.type));
                return () => socketRef.current.disconnect();
            }, [addLog]);

            return (
                <div style={{ height: '100%', display: 'flex', flexDirection: 'column', padding: '20px 24px', gap: '16px' }}>

                    {/* Header */}
                    <header style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '1px solid rgba(255,255,255,0.06)', paddingBottom: '14px' }}>
                        <div>
                            <div className="header-logo" style={{ fontSize: '20px', fontWeight: 700, color: '#fff', lineHeight: 1 }}>
                                AGENT<span style={{ color: '#6366f1' }}>MESH</span>
                                <span style={{ fontSize: '9px', color: 'rgba(100,116,139,0.7)', marginRight: '10px', fontWeight: 400 }}>v3.5 DYNAMIC</span>
                            </div>
                        </div>
                        <div className="status-pill" style={{
                            padding: '5px 14px',
                            borderRadius: '100px',
                            fontSize: '9px',
                            fontWeight: 700,
                            textTransform: 'uppercase',
                            letterSpacing: '0.08em',
                            display: 'flex',
                            alignItems: 'center',
                            gap: '6px',
                            background: isOnline ? 'rgba(16,185,129,0.08)' : 'rgba(239,68,68,0.08)',
                            border: `1px solid ${isOnline ? 'rgba(16,185,129,0.25)' : 'rgba(239,68,68,0.25)'}`,
                            color: isOnline ? '#10b981' : '#ef4444',
                        }}>
                            <span style={{
                                width: '6px', height: '6px', borderRadius: '50%',
                                background: isOnline ? '#10b981' : '#ef4444',
                                display: 'inline-block',
                                animation: isOnline ? 'onlinePulse 2s ease-in-out infinite' : 'none'
                            }} />
                            {isOnline ? 'Engine Online' : 'Engine Offline'}
                        </div>
                    </header>

                    {/* Main */}
                    <div style={{ flex: 1, display: 'flex', gap: '16px', overflow: 'hidden', position: 'relative' }} ref={containerRef}>

                        {/* SVG Connections */}
                        <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none', zIndex: 0 }}>
                            <defs>
                                <filter id="glow">
                                    <feGaussianBlur stdDeviation="3" result="blur" />
                                    <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
                                </filter>
                            </defs>
                            {connections.map((conn, idx) => {
                                const elA = agentRefs.current[conn.from];
                                const elB = agentRefs.current[conn.to];
                                if (!elA || !elB || !containerRef.current) return null;
                                const rA = elA.getBoundingClientRect();
                                const rB = elB.getBoundingClientRect();
                                const c = containerRef.current.getBoundingClientRect();

                                // نقطة الخروج: أسفل البطاقة A — مركزها أفقياً
                                const x1 = rA.left - c.left + rA.width / 2;
                                const y1 = rA.top - c.top + rA.height;

                                // نقطة الوصول: أسفل البطاقة B — مركزها أفقياً
                                const x2 = rB.left - c.left + rB.width / 2;
                                const y2 = rB.top - c.top + rB.height;

                                // مستوى التوجيه أسفل البطاقتين + هامش يتغير بالـ index لمنع التداخل
                                const routeOffset = 28 + (idx % 4) * 14;
                                const routeY = Math.max(y1, y2) + routeOffset;

                                // المسار: أسفل A → نزول عمودي → أفقي → صعود لأسفل B
                                const r = 8; // نصف قطر الزوايا المدوّرة
                                const goDown1 = routeY - y1; // المسافة الرأسية من A للخط الأفقي
                                const goDown2 = routeY - y2; // المسافة الرأسية من B للخط الأفقي

                                let d;
                                if (Math.abs(x1 - x2) < 4) {
                                    // نفس العمود تقريباً — خط مستقيم بسيط
                                    d = `M ${x1} ${y1} L ${x2} ${y2}`;
                                } else if (x1 < x2) {
                                    // A على اليسار → B على اليمين
                                    d = `M ${x1} ${y1}
                                         L ${x1} ${routeY - r}
                                         Q ${x1} ${routeY} ${x1 + r} ${routeY}
                                         L ${x2 - r} ${routeY}
                                         Q ${x2} ${routeY} ${x2} ${routeY - r}
                                         L ${x2} ${y2}`;
                                } else {
                                    // A على اليمين → B على اليسار
                                    d = `M ${x1} ${y1}
                                         L ${x1} ${routeY - r}
                                         Q ${x1} ${routeY} ${x1 - r} ${routeY}
                                         L ${x2 + r} ${routeY}
                                         Q ${x2} ${routeY} ${x2} ${routeY - r}
                                         L ${x2} ${y2}`;
                                }

                                const connColor = '#818cf8';
                                const pathLen = 200 + Math.abs(x1 - x2) + Math.abs(y1 - y2);

                                return (
                                    <g key={conn.id}>
                                        {/* ظل متوهج خلف الخط */}
                                        <path d={d} fill="none"
                                            stroke="rgba(99,102,241,0.18)" strokeWidth="6"
                                            strokeLinecap="round" strokeLinejoin="round" />
                                        {/* الخط الرئيسي المتحرك */}
                                        <path d={d} fill="none"
                                            stroke={connColor} strokeWidth="1.8"
                                            strokeLinecap="round" strokeLinejoin="round"
                                            strokeDasharray="10 6"
                                            style={{ animation: 'dashFlow 1.8s linear infinite' }} />
                                        {/* نقطة البداية (مرسِل) */}
                                        <circle cx={x1} cy={y1} r="4" fill={connColor} opacity="0.95" />
                                        <circle cx={x1} cy={y1} r="7" fill="none" stroke={connColor} strokeWidth="1" opacity="0.4"
                                            style={{ animation: 'pulseDot 1.5s ease-in-out infinite' }} />
                                        {/* نقطة النهاية (مستقبِل) مع سهم صغير */}
                                        <circle cx={x2} cy={y2} r="4" fill={connColor} opacity="0.95" />
                                        <polygon
                                            points={`${x2},${y2 - 10} ${x2 - 5},${y2 - 17} ${x2 + 5},${y2 - 17}`}
                                            fill={connColor} opacity="0.85" />
                                    </g>
                                );
                            })}
                        </svg>

                        {/* Agents Grid */}
                        <div style={{ flex: 1, overflowY: 'auto', zIndex: 10 }}
                             className="custom-scrollbar"
                             style={{ flex: 1, overflowY: 'auto', zIndex: 10, paddingLeft: '4px' }}>
                            <div style={{
                                display: 'grid',
                                gridTemplateColumns: 'repeat(auto-fill, minmax(150px, 1fr))',
                                gap: '12px'
                            }}>
                                {agents.map(agent => (
                                    <AgentCard
                                        key={agent.id}
                                        agent={agent}
                                        refCallback={el => agentRefs.current[agent.id] = el}
                                    />
                                ))}
                            </div>
                        </div>

                        {/* Log Panel */}
                        <aside style={{
                            width: '270px',
                            background: 'rgba(8,15,30,0.7)',
                            backdropFilter: 'blur(20px)',
                            border: '1px solid rgba(255,255,255,0.05)',
                            borderRadius: '18px',
                            display: 'flex',
                            flexDirection: 'column',
                            padding: '16px',
                            zIndex: 20,
                        }}>
                            <div style={{
                                fontSize: '9px',
                                fontWeight: 700,
                                color: 'rgba(99,102,241,0.6)',
                                textTransform: 'uppercase',
                                letterSpacing: '0.15em',
                                marginBottom: '12px',
                                fontFamily: 'Space Mono, monospace',
                                display: 'flex',
                                alignItems: 'center',
                                gap: '6px',
                            }}>
                                <span style={{ width: '4px', height: '4px', borderRadius: '50%', background: '#6366f1', display: 'inline-block', animation: 'pulseDot 2s infinite' }} />
                                System Logs
                            </div>
                            <div style={{ flex: 1, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: '6px' }}
                                 className="custom-scrollbar">
                                {logs.map(log => (
                                    <div key={log.id} className="log-item" style={{
                                        padding: '6px 8px',
                                        background: 'rgba(0,0,0,0.25)',
                                        borderRadius: '8px',
                                        borderRight: `2px solid ${log.type === 'success' ? '#10b981' : log.type === 'error' ? '#ef4444' : '#6366f1'}`,
                                        fontSize: '10px',
                                        fontFamily: 'Space Mono, monospace',
                                        lineHeight: 1.5,
                                    }}>
                                        <span style={{ color: 'rgba(100,116,139,0.6)', marginLeft: '4px', fontSize: '9px' }}>[{log.time}]</span>
                                        <span style={{ color: log.type === 'success' ? '#6ee7b7' : log.type === 'error' ? '#fca5a5' : '#c7d2fe' }}>
                                            {log.text}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </aside>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
